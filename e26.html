<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>e26</title>

<style>
body {
    margin: 0;
    padding: 40px;
    background: #eee;
    font-family: Arial;
}


.container {
    display: flex;
    justify-content: space-between;
}


.img-box {
    width: 33%;
    height: 300px;
    overflow: hidden;
}


.img-left img {
    width: 100%;
    height: 100%;
    border-radius: 18px;
    object-fit: cover; 
}


.img-center {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid white;
    align-self: center;
}

.img-center img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}


.img-right img {
    width: 100%;
    height: 100%;
    
}

</style>
</head>

<body>

<div class="container">

    
    <div class="img-box img-left">
        <img src="https://picsum.photos/id/1015/600/400">
    </div>

    
    <div class="img-center">
        <img src="https://picsum.photos/id/1016/600/400">
    </div>

    
    <div class="img-box img-right">
        <img src="https://picsum.photos/id/1015/600/400">
    </div>

</div>

</body>
</html>
