<!DOCTYPE html>
<html>
<head>
<style>

.rectangle{
    width:200px;
    height:200px;
    background:blue;
    position:absolute;
    left:50px;
    top:50px;
}

.circle{
    width:150px;
    height:150px;
    background:yellow;
    border:10px solid red;
    border-radius:50%;
    position:absolute;
    left:150px;
    top:80px;
}

</style>
</head>

<body>

<div class="rectangle"></div>
<div class="circle"></div>

</body>
</html>
