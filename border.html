<!DOCTYPE html>
<html>
<head>
<title>Hello World</title>

<style>

body{
    font-family: "Times New Roman";
}


.box1{
    width:320px;
    padding:10px;
    margin:15px;
    font-size:32px;
    font-weight:bold;

    background-color:#a9c9d3;

    border-width:6px;
    border-style:double;
    border-color:#ff6b5c;
}

/* 第二個 */
.box2{
    width:320px;
    padding:10px;
    margin:15px;
    font-size:32px;
    font-weight:bold;

    background-color:yellow;

    border-width:4px;
    border-style:solid;
    border-color:#2b8cff;
    border-radius:12px;
}

/* 第三個 */
.box3{
    width:320px;
    padding:10px;
    margin:15px;
    font-size:32px;
    font-weight:bold;

    background-color:#3aa36b;

    border-width:8px;
    border-style:dotted;
    border-color:gray;
}

</style>
</head>

<body>

<div class="box1">Hello World</div>

<div class="box2">Hello World</div>

<div class="box3">Hello World</div>

</body>
</html>
